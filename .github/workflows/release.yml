name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (for example v1.0.0-rc4)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  package-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve Release Tag
        id: meta
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG_INPUT="${{ inputs.tag }}"
            if [[ ! "$TAG_INPUT" =~ ^v.+$ ]]; then
              echo "error: tag must start with 'v' (got: $TAG_INPUT)" >&2
              exit 1
            fi
            echo "release_tag=$TAG_INPUT" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout (Tag Push)
        if: github.event_name == 'push'
        uses: actions/checkout@v4

      - name: Checkout (Manual Dispatch Tag)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ steps.meta.outputs.release_tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install Packaging Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            p7zip-full \
            pkg-config \
            libdbus-1-dev \
            gcc-mingw-w64-x86-64 \
            g++-mingw-w64-x86-64 \
            binutils-mingw-w64-x86-64 \
            nasm

      - name: Configure Windows GNU Toolchain
        run: |
          echo "CC_x86_64_pc_windows_gnu=x86_64-w64-mingw32-gcc" >> "$GITHUB_ENV"
          echo "CXX_x86_64_pc_windows_gnu=x86_64-w64-mingw32-g++" >> "$GITHUB_ENV"
          echo "AR_x86_64_pc_windows_gnu=x86_64-w64-mingw32-ar" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=x86_64-w64-mingw32-gcc" >> "$GITHUB_ENV"

      - name: Verify Windows GNU Toolchain
        run: |
          command -v x86_64-w64-mingw32-gcc
          command -v x86_64-w64-mingw32-g++
          command -v x86_64-w64-mingw32-ar

      - name: Build Release Archives
        run: ./scripts/package_release.sh "${{ steps.meta.outputs.release_tag }}"

      - name: Prepare Release Notes
        run: |
          NOTES_FILE="RELEASE_NOTES_${{ steps.meta.outputs.release_tag }}.MD"
          if [[ -f "$NOTES_FILE" ]]; then
            cp "$NOTES_FILE" /tmp/release_notes.md
          else
            {
              echo "# navtui ${{ steps.meta.outputs.release_tag }}"
              echo
              echo "Automated release build from CI."
              echo
              echo "This project was created with substantial generative AI assistance."
              echo "See AI_TRANSPARENCY.MD for details."
            } > /tmp/release_notes.md
          fi

      - name: Upload CI Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: navtui-${{ steps.meta.outputs.release_tag }}
          path: dist/releases/${{ steps.meta.outputs.release_tag }}/*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          body_path: /tmp/release_notes.md
          files: |
            dist/releases/${{ steps.meta.outputs.release_tag }}/linux_navtui_*.7z
            dist/releases/${{ steps.meta.outputs.release_tag }}/windows_navtui_*.7z
            dist/releases/${{ steps.meta.outputs.release_tag }}/SHA256SUMS
          fail_on_unmatched_files: true
          prerelease: ${{ contains(steps.meta.outputs.release_tag, '-rc') }}
