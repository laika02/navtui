name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install Packaging Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full

      - name: Build Release Archives
        run: ./scripts/package_release.sh "${GITHUB_REF_NAME}"

      - name: Prepare Release Notes
        run: |
          NOTES_FILE="RELEASE_NOTES_${GITHUB_REF_NAME}.MD"
          if [[ -f "$NOTES_FILE" ]]; then
            cp "$NOTES_FILE" /tmp/release_notes.md
          else
            cat > /tmp/release_notes.md <<EOF
# navtui ${GITHUB_REF_NAME}

Automated release build from CI.

This project was created with substantial generative AI assistance.
See AI_TRANSPARENCY.MD for details.
EOF
          fi

      - name: Upload CI Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: navtui-${{ github.ref_name }}
          path: dist/releases/${{ github.ref_name }}/*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: /tmp/release_notes.md
          files: |
            dist/releases/${{ github.ref_name }}/linux_navtui_*.7z
            dist/releases/${{ github.ref_name }}/windows_navtui_*.7z
            dist/releases/${{ github.ref_name }}/SHA256SUMS
          fail_on_unmatched_files: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}
