name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libdbus-1-dev \
            gcc-mingw-w64-x86-64 \
            g++-mingw-w64-x86-64 \
            binutils-mingw-w64-x86-64 \
            nasm

      - name: Configure Windows GNU Toolchain
        run: |
          echo "CC_x86_64_pc_windows_gnu=x86_64-w64-mingw32-gcc" >> "$GITHUB_ENV"
          echo "CXX_x86_64_pc_windows_gnu=x86_64-w64-mingw32-g++" >> "$GITHUB_ENV"
          echo "AR_x86_64_pc_windows_gnu=x86_64-w64-mingw32-ar" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=x86_64-w64-mingw32-gcc" >> "$GITHUB_ENV"

      - name: Format check
        run: cargo fmt --check

      - name: Linux check
        run: cargo check --locked

      - name: Linux release build
        run: cargo build --release --locked

      - name: Linux test
        run: cargo test --locked

      - name: Windows target check
        run: cargo check --locked --target x86_64-pc-windows-gnu
